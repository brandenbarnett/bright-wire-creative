<!DOCTYPE html>
<html>
  <body>
    <!--
      Netlify's build bot reads this static file to register the "contact"
      form. The live form is in components/ContactForm.tsx and submits via
      fetch(). Field names, form name, and data-netlify-honeypot must all
      match between this file and the fetch() POST body.
    -->
    <form
      name="contact"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="contact" />
      <input type="text"   name="bot-field" />
      <input type="text"   name="name" />
      <input type="email"  name="email" />
      <textarea            name="message"></textarea>
    </form>
  </body>
</html>
